@if (open()) {
  <section
    class="ai-chat-panel"
    role="dialog"
    aria-label="AI assistant conversation"
  >
    <header class="ai-chat-header">
      <span class="ai-chat-avatar">
        <mat-icon>smart_toy</mat-icon>
      </span>
      <span class="ai-chat-title">
        <strong>EduManage AI</strong>
        <small>Assistant</small>
      </span>
      <button
        type="button"
        class="ai-icon-button"
        aria-label="Close AI assistant"
        (click)="close()"
      >
        <mat-icon>close</mat-icon>
      </button>
    </header>

    <div #messagesPane class="ai-chat-messages">
      @for (message of messages(); track message.id) {
        <article class="ai-message" [class.ai-message-user]="message.role === 'user'">
          <div class="ai-message-bubble">
            @if (message.loading) {
              <span class="ai-typing-indicator" aria-label="Assistant is typing">
                <i></i>
                <i></i>
                <i></i>
              </span>
            } @else {
              <span class="ai-message-text">
                {{ message.renderedText }}
                @if (message.typing) {
                  <span class="ai-cursor"></span>
                }
              </span>
            }
          </div>
        </article>
      }
    </div>

    <footer class="ai-chat-composer">
      <textarea
        rows="1"
        placeholder="Ask anything..."
        [ngModel]="draft()"
        (ngModelChange)="draft.set($event)"
        (keydown)="onComposerKeydown($event)"
      ></textarea>
      <button
        type="button"
        class="ai-send-button"
        aria-label="Send message"
        [disabled]="sending() || !draft().trim()"
        (click)="sendMessage()"
      >
        <mat-icon>send</mat-icon>
      </button>
    </footer>
  </section>
}

<button
  type="button"
  class="ai-fab"
  aria-label="Open AI assistant"
  [attr.aria-expanded]="open()"
  (click)="toggle()"
>
  <mat-icon>{{ open() ? 'forum' : 'smart_toy' }}</mat-icon>
</button>
