
    <div class="space-y-6">
      <!-- Header -->
      <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
        <div>
          <h2 class="text-2xl font-bold text-slate-900 dark:text-white">My Media Library</h2>
          <p class="text-slate-500 dark:text-slate-500 text-sm">Manage your exams, videos, and teaching materials.</p>
        </div>
        <div class="flex gap-2">
          <button class="px-4 py-2 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-sm font-medium text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors flex items-center gap-2">
            <mat-icon class="text-sm">upload</mat-icon>
            Upload File
          </button>
          <button class="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg text-sm font-medium transition-all shadow-lg shadow-indigo-500/20 flex items-center gap-2">
            <mat-icon class="text-sm">add</mat-icon>
            Create New
          </button>
        </div>
      </div>

      <!-- Tabs -->
      <div class="flex items-center gap-6 border-b border-slate-200 dark:border-slate-800">
        @for (tab of tabs; track tab) {
          <button 
            (click)="setActiveTab(tab)"
            class="pb-3 text-sm font-bold uppercase tracking-wider transition-all relative"
            [class.text-indigo-600]="activeTab() === tab"
            [class.text-slate-500]="activeTab() !== tab"
          >
            {{ tab }}
            @if (activeTab() === tab) {
              <div class="absolute bottom-0 left-0 right-0 h-0.5 bg-indigo-600 rounded-full"></div>
            }
          </button>
        }
      </div>

      <!-- Media Grid -->
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
        @for (item of filteredMedia(); track item.id) {
          <div class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm overflow-hidden group hover:border-indigo-500 transition-all">
            <div class="aspect-video bg-slate-100 dark:bg-slate-800 flex items-center justify-center relative">
              <mat-icon class="text-4xl text-slate-300 group-hover:scale-110 transition-transform">
                {{ getIcon(item.type) }}
              </mat-icon>
              <div class="absolute top-2 right-2 px-2 py-0.5 bg-white/90 dark:bg-slate-900/90 rounded text-[10px] font-bold uppercase text-slate-500">
                {{ item.type }}
              </div>
            </div>
            <div class="p-4 space-y-2">
              <h3 class="font-bold text-slate-900 dark:text-white truncate">{{ item.title }}</h3>
              <div class="flex items-center justify-between text-[10px] text-slate-500 font-medium">
                <span>{{ item.date }}</span>
                <span>{{ item.size || item.group }}</span>
              </div>
              <div class="pt-2 flex items-center justify-between">
                <button class="text-xs font-bold text-indigo-600 hover:text-indigo-600 uppercase tracking-wider">Preview</button>
                <div class="flex gap-1">
                  <button class="p-1 text-slate-500 hover:text-indigo-600 transition-colors"><mat-icon class="text-sm">share</mat-icon></button>
                  <button class="p-1 text-slate-500 hover:text-rose-600 transition-colors"><mat-icon class="text-sm">delete</mat-icon></button>
                </div>
              </div>
            </div>
          </div>
        }
      </div>
    </div>
