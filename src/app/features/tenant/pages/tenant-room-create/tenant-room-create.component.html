<div class="tenant-room-create-page">
      <!-- Header -->
      <div class="tenant-room-create-header">
        <div class="tenant-room-create-header-stack">
          <div class="tenant-room-create-breadcrumb">
            <a routerLink="/tenant/rooms" class="tenant-room-create-breadcrumb-link">Rooms</a>
            <mat-icon class="text-[10px]">chevron_right</mat-icon>
            <span>{{ isEditMode() ? 'Edit Room' : 'Add New Room' }}</span>
          </div>
          <h2 class="tenant-room-create-title">{{ isEditMode() ? 'Edit Room' : 'Create Room' }}</h2>
        </div>
      </div>

      <form [formGroup]="roomForm" (ngSubmit)="onSubmit()" class="tenant-room-create-form">
        <div class="tenant-room-create-card">
          <div class="tenant-room-create-grid">
            <div class="tenant-room-create-field tenant-room-create-field--full">
              <label for="roomName" class="tenant-room-create-label">Room Name / Number</label>
              <input 
                id="roomName"
                type="text" 
                formControlName="name"
                placeholder="e.g. Room 101 or Physics Lab"
                class="tenant-room-create-input"
              >
            </div>

            <div class="tenant-room-create-field">
              <label for="roomType" class="tenant-room-create-label">Room Type</label>
              <select 
                id="roomType"
                formControlName="type"
                class="tenant-room-create-input"
              >
                <option value="Classroom">Classroom</option>
                <option value="Laboratory">Laboratory</option>
                <option value="Virtual">Virtual</option>
                <option value="Auditorium">Auditorium</option>
              </select>
            </div>

            <div class="tenant-room-create-field">
              <label for="capacity" class="tenant-room-create-label">Capacity (Seats)</label>
              <input 
                id="capacity"
                type="number" 
                formControlName="capacity"
                placeholder="30"
                class="tenant-room-create-input"
              >
            </div>

            <div class="tenant-room-create-field tenant-room-create-field--full">
              <p class="tenant-room-create-label tenant-room-create-label--equipment">Equipment & Facilities</p>
              <div class="tenant-room-create-equipment-grid">
                @for (item of availableEquipment; track item) {
                  <div class="tenant-room-create-equipment-item">
                    <input 
                      type="checkbox" 
                      [value]="item"
                      [id]="'equip-' + item"
                      [checked]="isEquipmentSelected(item)"
                      (change)="onEquipmentChange($event)"
                      class="tenant-room-create-checkbox"
                    >
                    <label [for]="'equip-' + item" class="tenant-room-create-equipment-label">{{ item }}</label>
                  </div>
                }
              </div>
            </div>

            <div class="tenant-room-create-field tenant-room-create-field--full">
              <label for="notes" class="tenant-room-create-label">Additional Notes</label>
              <textarea 
                id="notes"
                formControlName="notes"
                rows="3"
                placeholder="Any special instructions or maintenance notes..."
                class="tenant-room-create-input tenant-room-create-textarea"
              ></textarea>
            </div>
          </div>
        </div>

        <div class="tenant-room-create-actions">
          <button 
            type="button"
            (click)="onCancel()"
            class="tenant-room-create-btn tenant-room-create-btn--secondary"
          >
            Cancel
          </button>
          <button 
            type="submit"
            [disabled]="roomForm.invalid || isSubmitting()"
            class="tenant-room-create-btn tenant-room-create-btn--primary"
          >
            @if (isSubmitting()) {
              <mat-icon class="animate-spin text-sm">sync</mat-icon>
              Saving...
            } @else {
              <mat-icon class="text-sm">save</mat-icon>
              {{ isEditMode() ? 'Save Changes' : 'Create Room' }}
            }
          </button>
        </div>
      </form>
</div>
