
    <div class="max-w-2xl mx-auto space-y-6 pb-24">
      <div class="flex items-center justify-between">
        <div class="space-y-1">
          <div class="flex items-center gap-2 text-xs font-medium text-slate-500 uppercase tracking-wider">
            <button (click)="goBack()" class="hover:text-indigo-600 transition-colors flex items-center gap-1">
              <mat-icon class="text-sm">arrow_back</mat-icon>
              Grades
            </button>
            <mat-icon class="text-[10px]">chevron_right</mat-icon>
            <span>{{ isEditMode() ? 'Edit Grade' : 'Add New Grade' }}</span>
          </div>
          <h2 class="text-2xl font-bold text-slate-900 dark:text-white">{{ isEditMode() ? 'Edit Grade' : 'Create Grade' }}</h2>
        </div>

        <button 
          (click)="resetForm()"
          class="flex items-center gap-2 px-4 py-2 text-slate-500 hover:text-indigo-600 hover:bg-indigo-600/10 dark:hover:bg-indigo-900/20 rounded-xl text-xs font-bold transition-all uppercase tracking-wider"
        >
          <mat-icon class="text-sm">restart_alt</mat-icon>
          Reset
        </button>
      </div>

      <form [formGroup]="gradeForm" (ngSubmit)="onSubmit()" class="space-y-6">
        @if (loadError()) {
          <div class="p-3 rounded-lg bg-rose-50 dark:bg-rose-900/20 text-sm text-rose-700 dark:text-rose-300 border border-rose-200 dark:border-rose-900/40">
            {{ loadError() }}
          </div>
        }

        <div class="bg-white dark:bg-slate-900 p-6 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm space-y-4">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label for="gradeName" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Grade Name</label>
              <input 
                id="gradeName"
                type="text" 
                formControlName="name"
                placeholder="e.g. Grade 10 or Primary 1"
                class="w-full px-3 py-2 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
              >
            </div>

            <div>
              <label for="country" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Country</label>
              <select
                id="country"
                formControlName="countryId"
                (change)="onCountryChange($event)"
                class="w-full px-3 py-2 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
              >
                @if (countriesLoading()) {
                  <option value="">Loading countries...</option>
                } @else {
                  <option value="">Select country</option>
                }
                @for (country of countryOptions(); track country.value) {
                  <option [value]="country.value">{{ country.label }}</option>
                }
              </select>
              @if (countriesError()) {
                <p class="mt-1 text-xs text-rose-600">{{ countriesError() }}</p>
              }
            </div>

            <div>
              <label for="level" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Academic Level</label>
              <select 
                id="level"
                formControlName="stageId"
                [disabled]="levelsLoading() || academicLevelOptions().length === 0"
                class="w-full px-3 py-2 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
              >
                @if (levelsLoading()) {
                  <option value="">Loading academic levels...</option>
                } @else if (academicLevelOptions().length === 0) {
                  <option value="">No academic levels available</option>
                } @else {
                  <option value="">Select academic level</option>
                }
                @for (stage of academicLevelOptions(); track stage.value) {
                  <option [value]="stage.value">{{ stage.label }}</option>
                }
              </select>
              @if (levelsError()) {
                <p class="mt-1 text-xs text-rose-600">{{ levelsError() }}</p>
              }
            </div>

            <div class="md:col-span-2">
              <label for="description" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Description</label>
              <textarea 
                id="description"
                formControlName="description"
                rows="3"
                placeholder="Brief description of this grade..."
                class="w-full px-3 py-2 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
              ></textarea>
            </div>
          </div>
        </div>

        @if (saveError()) {
          <div class="p-3 rounded-lg bg-rose-50 dark:bg-rose-900/20 text-sm text-rose-700 dark:text-rose-300 border border-rose-200 dark:border-rose-900/40">
            {{ saveError() }}
          </div>
        }

        <div class="flex items-center justify-end gap-3">
          <button 
            type="button"
            (click)="goBack()"
            class="px-6 py-2 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-sm font-medium text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors"
          >
            Cancel
          </button>
          <button 
            type="submit"
            [disabled]="gradeForm.invalid || isSubmitting() || countriesLoading() || levelsLoading() || !!loadError()"
            class="px-6 py-2 bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed text-white rounded-lg text-sm font-medium transition-all shadow-lg shadow-indigo-500/20 flex items-center gap-2"
          >
            @if (isSubmitting()) {
              <mat-icon class="animate-spin text-sm">sync</mat-icon>
              Saving...
            } @else {
              <mat-icon class="text-sm">save</mat-icon>
              {{ isEditMode() ? 'Save Grade' : 'Create Grade' }}
            }
          </button>
        </div>
      </form>
    </div>
