<div class="max-w-2xl mx-auto space-y-6 pb-24">
  <div class="flex items-center justify-between">
    <div class="space-y-1">
      <div class="flex items-center gap-2 text-xs font-medium text-slate-500 uppercase tracking-wider">
        <button type="button" (click)="cancel()" class="hover:text-indigo-600 transition-colors flex items-center gap-1">
          <mat-icon class="text-sm">arrow_back</mat-icon>
          Subjects
        </button>
        <mat-icon class="text-[10px]">chevron_right</mat-icon>
        <span>{{ isEditMode() ? 'Edit Subject' : 'Add New Subject' }}</span>
      </div>
      <h2 class="text-2xl font-bold text-slate-900 dark:text-white">
        {{ isEditMode() ? 'Edit Subject' : 'Create Subject' }}
      </h2>
    </div>

    <button
      type="button"
      (click)="resetForm()"
      class="flex items-center gap-2 px-4 py-2 text-slate-500 hover:text-indigo-600 hover:bg-indigo-600/10 dark:hover:bg-indigo-900/20 rounded-xl text-xs font-bold transition-all uppercase tracking-wider"
    >
      <mat-icon class="text-sm">restart_alt</mat-icon>
      Reset
    </button>
  </div>

  <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-6">
    @if (loadError()) {
      <div class="p-3 rounded-lg bg-rose-50 dark:bg-rose-900/20 text-sm text-rose-700 dark:text-rose-300 border border-rose-200 dark:border-rose-900/40">
        {{ loadError() }}
      </div>
    }

    @if (optionsError()) {
      <div class="p-3 rounded-lg bg-rose-50 dark:bg-rose-900/20 text-sm text-rose-700 dark:text-rose-300 border border-rose-200 dark:border-rose-900/40">
        {{ optionsError() }}
      </div>
    }

    <div class="bg-white dark:bg-slate-900 p-6 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm space-y-4">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label for="universityId" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">University</label>
          <select
            id="universityId"
            formControlName="universityId"
            (change)="onUniversityChange()"
            [disabled]="optionsLoading() || universityOptions().length === 0"
            class="w-full px-3 py-2 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
          >
            @if (optionsLoading()) {
              <option value="">Loading universities...</option>
            } @else if (universityOptions().length === 0) {
              <option value="">No universities available</option>
            } @else {
              <option value="">Select university</option>
            }
            @for (university of universityOptions(); track university.value) {
              <option [value]="university.value">{{ university.label }}</option>
            }
          </select>
        </div>

        <div>
          <label for="collegeId" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">College</label>
          <select
            id="collegeId"
            formControlName="collegeId"
            [disabled]="optionsLoading() || filteredCollegeOptions().length === 0"
            class="w-full px-3 py-2 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
          >
            @if (optionsLoading()) {
              <option value="">Loading colleges...</option>
            } @else if (!form.controls.universityId.value) {
              <option value="">Select university first</option>
            } @else if (filteredCollegeOptions().length === 0) {
              <option value="">No colleges available for this university</option>
            } @else {
              <option value="">Select college</option>
            }
            @for (college of filteredCollegeOptions(); track college.value) {
              <option [value]="college.value">{{ college.label }}</option>
            }
          </select>
        </div>

        <div class="md:col-span-2">
          <label for="subjectName" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Subject name</label>
          <input
            id="subjectName"
            type="text"
            formControlName="name"
            placeholder="e.g. Computer Science"
            class="w-full px-3 py-2 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
          >
        </div>

        <div class="md:col-span-2">
          <label for="description" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Description</label>
          <textarea
            id="description"
            rows="4"
            formControlName="description"
            placeholder="Add a short description"
            class="w-full px-3 py-2 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-all resize-y"
          ></textarea>
        </div>
      </div>
    </div>

    @if (saveError()) {
      <div class="p-3 rounded-lg bg-rose-50 dark:bg-rose-900/20 text-sm text-rose-700 dark:text-rose-300 border border-rose-200 dark:border-rose-900/40">
        {{ saveError() }}
      </div>
    }

    <div class="flex items-center justify-end gap-3">
      <button
        type="button"
        (click)="cancel()"
        class="px-6 py-2 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-sm font-medium text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors"
      >
        Cancel
      </button>
      <button
        type="submit"
        [disabled]="form.invalid || saving() || optionsLoading() || !!loadError() || !!optionsError()"
        class="px-6 py-2 bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed text-white rounded-lg text-sm font-medium transition-all shadow-lg shadow-indigo-500/20 flex items-center gap-2"
      >
        @if (saving()) {
          <mat-icon class="animate-spin text-sm">sync</mat-icon>
          Saving...
        } @else {
          <mat-icon class="text-sm">save</mat-icon>
          Save Subject
        }
      </button>
    </div>
  </form>
</div>
