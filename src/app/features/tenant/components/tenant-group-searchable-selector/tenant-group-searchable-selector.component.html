<label [for]="triggerId()" class="block text-sm font-medium text-slate-700 dark:text-slate-300" [class.mb-1]="!hideLabel()" [class.sr-only]="hideLabel()">{{ label() }}</label>
<button
  [id]="triggerId()"
  type="button"
  class="tenant-group-searchable-selector-trigger w-full px-3 py-2 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-sm text-left focus:ring-2 focus:ring-indigo-500 outline-none flex items-center justify-between transition-all disabled:cursor-not-allowed disabled:opacity-60"
  [disabled]="disabled()"
  [attr.aria-disabled]="disabled()"
  (click)="onToggle()"
>
  <span [class.text-slate-500]="!selectedValue()">
    {{ selectedValue() || placeholder() }}
  </span>
  <mat-icon class="text-slate-500 transition-transform duration-200" [class.rotate-180]="isOpen()">expand_more</mat-icon>
</button>

@if (isOpen()) {
  <div class="absolute left-0 right-0 mt-1 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-lg shadow-xl z-50 overflow-hidden animate-in fade-in zoom-in-95 duration-200 origin-top">
    <div class="p-2 border-b border-slate-200 dark:border-slate-800">
      <div class="relative">
        <mat-icon class="tenant-group-searchable-selector-search-icon absolute left-2 top-1/2 -translate-y-1/2 text-slate-500 text-xs">search</mat-icon>
        <input
          type="text"
          [value]="searchQuery()"
          [placeholder]="searchPlaceholder()"
          class="tenant-group-searchable-selector-search-input w-full pl-8 pr-3 py-1.5 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-md text-xs outline-none focus:ring-1 focus:ring-indigo-500"
          (input)="onSearchInput($event)"
        >
      </div>
    </div>

    <div class="max-h-48 overflow-y-auto py-1">
      @for (item of options(); track item.id) {
        <button
          type="button"
          class="tenant-group-searchable-selector-option w-full px-4 py-2 text-sm text-left hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors flex flex-col"
          (click)="onSelect(item.name)"
        >
          <span class="font-medium text-slate-900 dark:text-white">{{ item.name }}</span>
          @if (item.subtitle) {
            <span class="text-[10px] text-slate-500">{{ item.subtitle }}</span>
          }
        </button>
      } @empty {
        <div class="px-4 py-3 text-center">
          <p class="text-xs text-slate-500">{{ emptyText() }}</p>
        </div>
      }
    </div>

    @if (footerRouterLink()) {
      <div class="p-2 border-t border-slate-200 dark:border-slate-800 bg-slate-50/50 dark:bg-slate-800/50">
        <a
          [routerLink]="footerRouterLink()!"
          [queryParams]="footerQueryParams()"
          class="flex items-center justify-center gap-2 w-full py-1.5 text-[10px] font-bold text-indigo-600 hover:text-indigo-600 uppercase tracking-wider transition-colors"
        >
          <mat-icon class="text-xs">{{ footerIcon() }}</mat-icon>
          {{ footerLabel() }}
        </a>
      </div>
    }

    @if (footerButton()) {
      <div class="p-2 border-t border-slate-200 dark:border-slate-800 bg-slate-50/50 dark:bg-slate-800/50">
        <button
          type="button"
          class="flex items-center justify-center gap-2 w-full py-1.5 text-[10px] font-bold text-indigo-600 hover:text-indigo-600 uppercase tracking-wider transition-colors"
          (click)="onFooterClick()"
        >
          <mat-icon class="text-xs">{{ footerIcon() }}</mat-icon>
          {{ footerButton() }}
        </button>
      </div>
    }
  </div>
}
