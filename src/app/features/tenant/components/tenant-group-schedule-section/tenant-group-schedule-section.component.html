<div [formGroup]="groupForm()" class="space-y-4">
  <div class="md:col-span-2">
    <span class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Weekly Schedule</span>
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-2">
      @for (day of days(); track day) {
        <label
          class="flex items-center gap-2 p-2 border border-slate-200 dark:border-slate-700 rounded-lg cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors"
          [class.bg-indigo-600/10]="isSelected(day)"
          [class.border-indigo-200]="isSelected(day)"
          [class.dark:bg-indigo-900/20]="isSelected(day)"
        >
          <input
            type="checkbox"
            [value]="day"
            [checked]="isSelected(day)"
            (change)="onDayToggle(day)"
            class="rounded border-slate-200 text-indigo-600"
          >
          <span class="text-xs font-medium text-slate-500 dark:text-slate-500" [class.text-indigo-600]="isSelected(day)">{{ day }}</span>
        </label>
      }
    </div>

    @if (selectedDays().length === 0) {
      <p class="text-[10px] text-amber-500 mt-1">Please select at least one day.</p>
    }
  </div>

  @if (selectedDays().length > 0) {
    <div class="md:col-span-2 animate-in fade-in slide-in-from-top-2 duration-200">
      <div class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Time Schedule Type</div>
      <div class="flex gap-4">
        <label class="flex items-center gap-2 cursor-pointer">
          <input
            type="radio"
            formControlName="isFixedTime"
            [value]="true"
            (change)="onTimeTypeChange(true)"
            class="text-indigo-600 focus:ring-indigo-500"
          >
          <span class="text-sm text-slate-700 dark:text-slate-300">Fixed time for all days</span>
        </label>
        <label class="flex items-center gap-2 cursor-pointer">
          <input
            type="radio"
            formControlName="isFixedTime"
            [value]="false"
            (change)="onTimeTypeChange(false)"
            class="text-indigo-600 focus:ring-indigo-500"
          >
          <span class="text-sm text-slate-700 dark:text-slate-300">Different time per day</span>
        </label>
      </div>
    </div>

    @if (groupForm().get('isFixedTime')?.value) {
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4 animate-in fade-in slide-in-from-top-2 duration-200">
        <div>
          <label for="startTime" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Start Time</label>
          <input
            id="startTime"
            type="time"
            formControlName="startTime"
            class="w-full px-3 py-2 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
            [class.teacher-unavailable-control]="fixedTimeConflicts()"
          >
        </div>

        <div>
          <label for="duration" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Duration (Minutes)</label>
          <input
            id="duration"
            type="number"
            formControlName="duration"
            placeholder="90"
            class="w-full px-3 py-2 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
            [class.teacher-unavailable-control]="fixedTimeConflicts()"
          >
        </div>
      </div>
    } @else {
      <div class="space-y-3 animate-in fade-in slide-in-from-top-2 duration-200" formGroupName="daySchedules">
        @for (day of selectedDays(); track day) {
          <div
            class="rounded-lg border border-indigo-300 bg-indigo-50/20 p-3 shadow-sm dark:border-indigo-500 dark:bg-indigo-500/10"
            [formGroupName]="day"
          >
            <div class="mb-3 flex items-center justify-between">
              <span class="text-sm font-semibold text-indigo-700 dark:text-indigo-200">{{ day }}</span>
            </div>

            <div class="grid grid-cols-1 gap-3 md:grid-cols-3">
              <div>
                <label class="mb-1 block text-xs font-medium text-slate-600 dark:text-slate-400">Start Time</label>
                <input
                  type="time"
                  formControlName="startTime"
                  class="w-full px-3 py-2 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-sm"
                  [class.teacher-unavailable-control]="dayScheduleConflicts(day)"
                >
              </div>

              <div>
                <label class="mb-1 block text-xs font-medium text-slate-600 dark:text-slate-400">End Time</label>
                <input
                  type="time"
                  formControlName="endTime"
                  class="w-full px-3 py-2 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-sm"
                  [class.teacher-unavailable-control]="dayScheduleConflicts(day)"
                >
              </div>

              <div class="relative">
                <app-tenant-group-searchable-selector
                  [triggerId]="'dayRoomBtn-' + day"
                  label="Select Room"
                  placeholder="Select Room ..."
                  searchPlaceholder="Search rooms..."
                  emptyText="No rooms found"
                  [selectedValue]="selectedDayRoom(day)"
                  [isOpen]="openDayRoomDropdown() === day"
                  [options]="filteredDayRooms()"
                  [searchQuery]="dayRoomSearchQuery()"
                  (toggled)="toggleDayRoomDropdown(day)"
                  (searchQueryChanged)="setDayRoomSearchQuery($event)"
                  (selected)="selectDayRoom(day, $event)"
                />
              </div>
            </div>
          </div>
        }
      </div>
    }
  }
</div>
