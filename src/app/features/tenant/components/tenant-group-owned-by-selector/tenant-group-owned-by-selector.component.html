<label for="ownedByBtn" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Owned By</label>
<button
  id="ownedByBtn"
  type="button"
  class="w-full px-3 py-2 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-sm text-left focus:ring-2 focus:ring-indigo-500 outline-none flex items-center justify-between transition-all"
  (click)="toggled.emit()"
>
  <span [class.text-slate-500]="!selectedValue()">
    {{ selectedValue() || 'Select One ...' }}
  </span>
  <mat-icon class="text-slate-500 transition-transform duration-200" [class.rotate-180]="isOpen()">expand_more</mat-icon>
</button>

@if (isOpen()) {
  <div class="absolute left-0 right-0 mt-1 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-lg shadow-xl z-50 overflow-hidden animate-in fade-in zoom-in-95 duration-200 origin-top">
    <div class="py-1">
      <button
        type="button"
        class="w-full px-4 py-2 text-sm text-left hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors text-slate-500 italic"
        (click)="onSelect('')"
      >
        Select One ...
      </button>
      @for (option of options(); track option.id) {
        <button
          type="button"
          class="w-full px-4 py-2 text-sm text-left hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors flex items-center gap-2"
          (click)="onSelect(option.name)"
        >
          <mat-icon class="text-sm text-indigo-600">person</mat-icon>
          {{ option.name }}
        </button>
      }
    </div>
  </div>
}
