<div
  class="w-full px-3 py-2 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 cursor-pointer flex justify-between items-center transition-all"
  role="combobox"
  tabindex="0"
  aria-haspopup="listbox"
  aria-controls="plan-listbox"
  [attr.aria-expanded]="isOpen()"
  (click)="onToggle()"
  (keydown.enter)="onToggle()"
>
  <span [class.text-slate-500]="!selectedPlanId()">
    {{ selectedPlanName() || 'Select subscription template' }}
  </span>
  <mat-icon class="text-slate-500">arrow_drop_down</mat-icon>
</div>

@if (isOpen()) {
  <div
    class="fixed inset-0 z-10"
    (click)="onClose()"
    (keydown.enter)="onClose()"
    tabindex="0"
    role="button"
    aria-label="Close dropdown"
  ></div>

  <div id="plan-listbox" role="listbox" class="absolute z-20 w-full mt-1 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg shadow-lg overflow-hidden animate-in fade-in slide-in-from-top-2 duration-200">
    <div class="p-2 border-b border-slate-200 dark:border-slate-700">
      <div class="relative">
        <mat-icon class="absolute left-2 top-1/2 -translate-y-1/2 text-slate-500 text-sm">search</mat-icon>
        <input
          type="text"
          [value]="searchQuery()"
          placeholder="Search subscription templates..."
          class="w-full pl-8 pr-3 py-1.5 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded text-sm focus:outline-none focus:ring-1 focus:ring-indigo-500"
          (input)="onSearchInput($event)"
          (click)="$event.stopPropagation()"
          (keydown)="$event.stopPropagation()"
        >
      </div>
    </div>

    <div class="max-h-64 overflow-y-auto p-2 space-y-1">
      @for (plan of filteredPlans(); track plan.id) {
        <button
          type="button"
          role="option"
          class="w-full text-left flex items-center justify-between p-3 rounded-lg transition-all focus:outline-none"
          [attr.aria-selected]="selectedPlanId() === plan.id"
          [class.bg-indigo-600/10]="selectedPlanId() === plan.id"
          [class.dark:bg-indigo-900/20]="selectedPlanId() === plan.id"
          [class.hover:bg-slate-50]="selectedPlanId() !== plan.id"
          [class.dark:hover:bg-slate-700]="selectedPlanId() !== plan.id"
          [class.focus:bg-slate-50]="selectedPlanId() !== plan.id"
          [class.dark:focus:bg-slate-700]="selectedPlanId() !== plan.id"
          (click)="onSelect(plan.id)"
        >
          <div class="flex items-center gap-3">
            <div class="flex-1">
              <p class="text-sm font-bold text-slate-900 dark:text-white">{{ plan.name }}</p>
              <p class="text-[10px] text-slate-500">{{ plan.price }}</p>
            </div>
          </div>
          <div class="flex items-center gap-2">
            @if (plan.popular) {
              <span class="px-1.5 py-0.5 bg-indigo-100 dark:bg-indigo-900/40 text-indigo-600 dark:text-indigo-400 text-[8px] font-bold rounded uppercase">Popular</span>
            }
            @if (selectedPlanId() === plan.id) {
              <mat-icon class="text-indigo-600 text-sm">check</mat-icon>
            }
          </div>
        </button>
      }

      @if (filteredPlans().length === 0) {
        <div class="px-3 py-4 text-sm text-center text-slate-500">No plans found</div>
      }
    </div>
  </div>
}
