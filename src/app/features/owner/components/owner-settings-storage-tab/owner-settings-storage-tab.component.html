<div class="owner-settings-card owner-settings-card--shell">
  <div class="p-6 border-b border-slate-200 dark:border-slate-800">
    <h3 class="owner-settings-card-title text-lg font-semibold text-slate-900 dark:text-white">{{ translate()('owner.settings.storage.title') }}</h3>
  </div>
  <div class="p-6 space-y-6">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div>
        <label for="def-storage" class="owner-settings-field-label">Default Storage Limit (GB)</label>
        <input id="def-storage" type="number" class="owner-settings-input dark:bg-slate-800 dark:border-slate-700" value="10">
      </div>
      <div>
        <label for="max-upload" class="owner-settings-field-label">Max Upload Size (MB)</label>
        <input id="max-upload" type="number" class="owner-settings-input dark:bg-slate-800 dark:border-slate-700" value="50">
      </div>
    </div>
    <div>
      <label for="file-types" class="owner-settings-field-label">Allowed File Types</label>
      <input id="file-types" type="text" class="owner-settings-input dark:bg-slate-800 dark:border-slate-700" value=".pdf, .doc, .docx, .xls, .xlsx, .png, .jpg, .jpeg">
      <p class="text-xs text-slate-500 mt-1">Comma-separated list of file extensions.</p>
    </div>
  </div>
  <div class="owner-settings-footer p-4 dark:bg-slate-800/50">
    <button class="owner-settings-btn-primary px-4 py-2 shadow-sm">{{ translate()('owner.settings.storage.save') }}</button>
  </div>
</div>
