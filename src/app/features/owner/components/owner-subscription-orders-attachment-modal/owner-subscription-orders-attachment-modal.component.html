@if (isOpen()) {
  <div class="fixed inset-0 z-[100] flex items-center justify-center p-4 sm:p-6">
    <div
      class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm animate-in fade-in duration-300 cursor-pointer"
      (click)="closed.emit()"
      (keydown.enter)="closed.emit()"
      tabindex="0"
      role="button"
      aria-label="Close modal backdrop"
    ></div>

    <div class="relative w-full max-w-4xl bg-white dark:bg-slate-900 rounded-2xl shadow-2xl overflow-hidden animate-in zoom-in duration-300 flex flex-col max-h-[90vh]">
      <div class="flex items-center justify-between px-6 py-4 border-b border-slate-200 dark:border-slate-800">
        <div class="flex items-center gap-3">
          <div class="p-2 bg-indigo-600/10 dark:bg-indigo-900/20 rounded-lg">
            <mat-icon class="text-indigo-600 dark:text-indigo-400">receipt</mat-icon>
          </div>
          <h3 class="font-bold text-slate-900 dark:text-white">Payment Receipt</h3>
        </div>
        <button class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors" (click)="closed.emit()">
          <mat-icon>close</mat-icon>
        </button>
      </div>

      <div class="flex-1 overflow-auto p-6 bg-slate-50 dark:bg-slate-950 flex items-center justify-center">
        <div class="relative group max-w-full">
          <img
            [src]="attachmentUrl()"
            alt="Payment Receipt"
            class="max-w-full h-auto rounded-lg shadow-lg border border-slate-200 dark:border-slate-800"
            referrerpolicy="no-referrer"
          >
          <div class="absolute inset-0 bg-black/0 group-hover:bg-black/5 transition-colors rounded-lg pointer-events-none"></div>
        </div>
      </div>

      <div class="px-6 py-4 border-t border-slate-200 dark:border-slate-800 flex justify-end gap-3">
        <button
          class="px-4 py-2 text-sm font-medium text-slate-500 dark:text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors"
          (click)="closed.emit()"
        >
          Close
        </button>
        <a
          [href]="attachmentUrl()"
          target="_blank"
          class="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium rounded-lg transition-all flex items-center gap-2 shadow-lg shadow-indigo-200 dark:shadow-none"
        >
          <mat-icon class="text-sm">open_in_new</mat-icon>
          Open in New Tab
        </a>
      </div>
    </div>
  </div>
}
